name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build Release Asset (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    env:
      CXX: c++

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Build release binary
        run: make

      - name: Run test suite
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          os="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          arch="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          package="mesh2solid-${tag}-${os}-${arch}"
          mkdir -p "dist/${package}"
          cp build/mesh2solid "dist/${package}/mesh2solid"
          cp README.md "dist/${package}/README.md"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          rm -rf "dist/${package}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-release-assets

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          assets=(dist/**/*.tar.gz)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were produced."
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
