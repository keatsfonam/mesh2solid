name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build Full-Stack Release Asset (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Build Docker image
        run: docker build -t mesh2solid-release .

      - name: Build and test inside Docker
        run: |
          mkdir -p build-cmake
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            mesh2solid-release \
            bash -lc "cmake -S . -B build-cmake/docker-full -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DMESH2SOLID_ENABLE_CGAL=ON -DMESH2SOLID_ENABLE_OPENCASCADE=ON && cmake --build build-cmake/docker-full --parallel 1 && MESH2SOLID_BIN=build-cmake/docker-full/mesh2solid MESH2SOLID_SKIP_BUILD=1 python3 -m unittest discover -s tests -p 'test_*.py'"

      - name: Run Docker full-stack benchmarks
        run: |
          mkdir -p build-cmake
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            mesh2solid-release \
            bash -lc "cmake -S . -B build-cmake/docker-full -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DMESH2SOLID_ENABLE_CGAL=ON -DMESH2SOLID_ENABLE_OPENCASCADE=ON && cmake --build build-cmake/docker-full --parallel 1 && MESH2SOLID_BIN=build-cmake/docker-full/mesh2solid MESH2SOLID_SKIP_BUILD=1 python3 benchmarks/run_examples.py --expectation-profile docker-full"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          os="linux"
          arch="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          package="mesh2solid-${tag}-${os}-${arch}"
          binary="build-cmake/docker-full/mesh2solid"
          mkdir -p "dist/${package}"
          cp "${binary}" "dist/${package}/mesh2solid"
          cp README.md "dist/${package}/README.md"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          rm -rf "dist/${package}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ runner.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-release-assets

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          assets=(dist/**/*.tar.gz)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were produced."
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
