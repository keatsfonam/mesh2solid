name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-full-stack:
    name: Docker Full Stack (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t mesh2solid-ci .

      - name: Build and test inside Docker
        run: |
          mkdir -p build-cmake
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            mesh2solid-ci \
            bash -lc "cmake -S . -B build-cmake/docker-full -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DMESH2SOLID_ENABLE_CGAL=ON -DMESH2SOLID_ENABLE_OPENCASCADE=ON && cmake --build build-cmake/docker-full --parallel 1 && MESH2SOLID_BIN=build-cmake/docker-full/mesh2solid MESH2SOLID_SKIP_BUILD=1 python3 -m unittest discover -s tests -p 'test_*.py'"

      - name: Run Docker full-stack benchmarks
        run: |
          mkdir -p build-cmake
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            mesh2solid-ci \
            bash -lc "cmake -S . -B build-cmake/docker-full -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DMESH2SOLID_ENABLE_CGAL=ON -DMESH2SOLID_ENABLE_OPENCASCADE=ON && cmake --build build-cmake/docker-full --parallel 1 && MESH2SOLID_BIN=build-cmake/docker-full/mesh2solid MESH2SOLID_SKIP_BUILD=1 python3 benchmarks/run_examples.py --expectation-profile docker-full"

  host-smoke:
    name: Host Smoke Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    env:
      CXX: c++

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev

      - name: Build with Make
        run: make

      - name: Build with CMake
        run: |
          mkdir -p build-cmake
          cmake --preset host-minimal
          cmake --build --preset host-minimal

      - name: Run test suite
        run: python3 -m unittest discover -s tests -p 'test_*.py'
